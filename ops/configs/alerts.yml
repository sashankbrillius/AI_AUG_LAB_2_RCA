groups:
  - name: lab2_rca_alerts
    rules:
      - alert: RCALatencyHigh
        expr: histogram_quantile(0.95, sum(rate(rca_generation_seconds_bucket{service="rca-gateway"}[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RCA generation p95 latency > 5s"
          description: "Check LLM response time or reduce log volume passed to RCA."

      - alert: HighErrorLogRate
        expr: sum(rate(logs_ingested_total{service="rca-gateway",source="smartdine_app"}[5m])) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High log ingestion rate from SmartDine app"
          description: "Possible incident in progress — check log sources."

      - alert: TokenBurnHigh
        expr: sum(increase(llm_tokens_total{service="rca-gateway",direction="prompt"}[1h])) > 100000
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High prompt token burn for RCA generation"
          description: "Repeated RCA calls or large log context. Consider filtering logs first."
